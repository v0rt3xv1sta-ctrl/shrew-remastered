<!DOCTYPE html>
<html>
<head>
    <title>Shrew Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'Lucida Grande', 'Helvetica Neue', Helvetica, Arial, sans-serif;
          background: #5a5a5a;
          color: #e0e0e0;
        }

        .toolbar {
          background: #4a4a4a;
          padding: 6px 8px;
          display: flex;
          gap: 6px;
          border-bottom: 1px solid #666;
          box-shadow: inset 0 1px 0 #5a5a5a;
        }

        button {
          background: #6a6a6a;
          color: #e0e0e0;
          border: 1px solid #777;
          padding: 4px 8px;
          border-radius: 0px;
          cursor: pointer;
          font-size: 12px;
          box-shadow: 0 1px 0 #7a7a7a;
        }

        button:hover {
          background: #7a7a7a;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }

        button:active {
          background: #5a5a5a;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        }

        #urlbar {
          flex: 1;
          background: #3a3a3a;
          color: #e0e0e0;
          border: 1px solid #666;
          padding: 4px 6px;
          border-radius: 0px;
          font-size: 12px;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
        }

        #urlbar:focus {
          outline: none;
          border-color: #888;
          box-shadow: 0 0 0 1px #888;
        }

        webview {
          width: 100%;
          height: calc(100vh - 38px);
        }
    </style>
</head>
<body>
<div class="toolbar">
    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>
    <button onclick="reload()">⟳</button>
    <input type="text" id="urlbar" placeholder="type url..." />
    <button onclick="navigate()">Go</button>
</div>

<webview 
    id="browser" 
    src="homepage.html"
    webpreferences="webSecurity=no,nodeIntegration=no,contextIsolation=yes"
    useragent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
    allowpopups
    disablewebsecurity
    partition="persist:shrew">
</webview>

<script>
    const webview = document.getElementById('browser');
    const urlbar = document.getElementById('urlbar');
    let isReady = false;

    // Wait for webview to be ready
    webview.addEventListener('dom-ready', () => {
      isReady = true;
      console.log('Webview ready!');
      
      // Inject CSS to ensure proper rendering
      webview.insertCSS(`
        * {
          box-sizing: border-box;
        }
        body {
          margin: 0;
          padding: 0;
        }
      `);
    });

    // Handle loading errors
    webview.addEventListener('did-fail-load', (e) => {
      console.error('Failed to load:', e.validatedURL, e.errorDescription);
    });

    // Handle certificate errors
    webview.addEventListener('certificate-error', (e) => {
      console.log('Certificate error, continuing...');
      e.preventDefault();
    });

    // update url bar when page changes
    webview.addEventListener('did-navigate', (e) => {
      console.log('Navigated to:', e.url);
      // If it's the homepage, keep URL bar blank
      if (e.url.includes('homepage.html')) {
        urlbar.value = '';
      } else {
        urlbar.value = e.url;
      }
    });

    webview.addEventListener('did-navigate-in-page', (e) => {
      // If it's the homepage, keep URL bar blank
      if (e.url.includes('homepage.html')) {
        urlbar.value = '';
      } else {
        urlbar.value = e.url;
      }
    });

    function navigate() {
      let input = urlbar.value.trim();
      console.log('Navigate called with:', input);

      // If blank, go to homepage
      if (!input) {
        console.log('Going to homepage');
        webview.loadURL('homepage.html');
        return;
      }

      // Detect if it's a URL or a search query
      const isURL = input.includes('.') && !input.includes(' ') &&
                    (input.startsWith('http://') || input.startsWith('https://') ||
                     /\w+\.\w{2,}/.test(input));

      if (isURL) {
        // It's a URL - navigate to it
        let url = input;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }
        console.log('Loading URL:', url);
        webview.loadURL(url);
      } else {
        // It's a search query - go to search page
        console.log('Searching for:', input);
        webview.loadURL(`search.html?q=${encodeURIComponent(input)}`);
      }
    }

    function goBack() {
      if (webview.canGoBack()) {
        webview.goBack();
      }
    }

    function goForward() {
      if (webview.canGoForward()) {
        webview.goForward();
      }
    }

    function reload() {
      webview.reload();
    }

    // press enter to navigate
    urlbar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        navigate();
      }
    });
</script>
</body>
</html>
