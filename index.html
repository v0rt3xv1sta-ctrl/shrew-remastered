<!DOCTYPE html>
<html>
<head>
    <title>Shrew Browser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
          font-family: 'Lucida Grande', 'Helvetica Neue', Helvetica, Arial, sans-serif;
          background: #5a5a5a;
          color: #e0e0e0;
        }

        .tabbar {
          background: #3a3a3a;
          padding: 4px 4px 0 4px;
          display: flex;
          gap: 2px;
          border-bottom: 1px solid #2a2a2a;
          align-items: flex-end;
          overflow-x: auto;
        }

        .tab {
          background: #4a4a4a;
          color: #cfcfcf;
          border: 1px solid #2a2a2a;
          border-bottom: none;
          padding: 4px 8px;
          font-size: 12px;
          cursor: pointer;
          display: flex;
          align-items: center;
          gap: 6px;
          max-width: 180px;
          min-width: 80px;
          border-radius: 4px 4px 0 0;
          box-shadow: inset 0 1px 0 #5a5a5a;
          user-select: none;
        }

        .tab:hover { background: #5a5a5a; }

        .tab.active {
          background: #5a5a5a;
          color: #fff;
          box-shadow: inset 0 1px 0 #6a6a6a;
        }

        .tab-title {
          white-space: nowrap;
          overflow: hidden;
          text-overflow: ellipsis;
          flex: 1;
        }

        .tab-close {
          background: transparent;
          border: none;
          color: #cfcfcf;
          padding: 0 2px;
          font-size: 12px;
          line-height: 1;
          box-shadow: none;
          cursor: pointer;
        }

        .tab-close:hover {
          background: #7a3a3a;
          color: #fff;
          box-shadow: none;
        }

        .tab-new {
          background: #4a4a4a;
          color: #e0e0e0;
          border: 1px solid #2a2a2a;
          border-bottom: none;
          padding: 4px 10px;
          font-size: 14px;
          cursor: pointer;
          border-radius: 4px 4px 0 0;
          box-shadow: inset 0 1px 0 #5a5a5a;
        }

        .tab-new:hover { background: #6a6a6a; }

        .toolbar {
          background: #4a4a4a;
          padding: 6px 8px;
          display: flex;
          gap: 6px;
          border-bottom: 1px solid #666;
          box-shadow: inset 0 1px 0 #5a5a5a;
        }

        button {
          background: #6a6a6a;
          color: #e0e0e0;
          border: 1px solid #777;
          padding: 4px 8px;
          border-radius: 0px;
          cursor: pointer;
          font-size: 12px;
          box-shadow: 0 1px 0 #7a7a7a;
        }

        button:hover {
          background: #7a7a7a;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.2);
        }

        button:active {
          background: #5a5a5a;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
        }

        #urlbar {
          flex: 1;
          background: #3a3a3a;
          color: #e0e0e0;
          border: 1px solid #666;
          padding: 4px 6px;
          border-radius: 0px;
          font-size: 12px;
          box-shadow: inset 0 1px 2px rgba(0,0,0,0.3);
        }

        #urlbar:focus {
          outline: none;
          border-color: #888;
          box-shadow: 0 0 0 1px #888;
        }

        #webview-container {
          width: 100%;
          height: calc(100vh - 71px);
          position: relative;
        }

        webview {
          width: 100%;
          height: 100%;
          display: none;
        }

        webview.active { display: flex; }
    </style>
</head>
<body>
<div class="tabbar" id="tabbar">
    <button class="tab-new" id="newtab" onclick="newTab()">+</button>
</div>

<div class="toolbar">
    <button onclick="goBack()">←</button>
    <button onclick="goForward()">→</button>
    <button onclick="reload()">⟳</button>
    <input type="text" id="urlbar" placeholder="type url..." />
    <button onclick="navigate()">Go</button>
    <button onclick="openExternal()" title="Open current page in system browser">⇱</button>
</div>

<div id="webview-container"></div>

<script>
    const urlbar = document.getElementById('urlbar');
    const tabbar = document.getElementById('tabbar');
    const newTabBtn = document.getElementById('newtab');
    const webviewContainer = document.getElementById('webview-container');

    // Absolute file:// URL to preload.js so the webview tag accepts it.
    const path = require('path');
    const { pathToFileURL } = require('url');
    const PRELOAD_URL = pathToFileURL(path.join(__dirname, 'preload.js')).toString();

    let tabs = [];
    let activeTabId = null;
    let nextTabId = 1;

    function getActiveWebview() {
      const tab = tabs.find(t => t.id === activeTabId);
      return tab ? tab.webview : null;
    }

    // keep legacy #browser selector pointing at the active webview
    Object.defineProperty(document, 'browserWebview', {
      get: () => getActiveWebview()
    });

    function createTab(url) {
      const id = nextTabId++;

      const webview = document.createElement('webview');
      webview.id = 'browser-' + id;
      webview.setAttribute('src', url || 'homepage.html');
      webview.setAttribute('webpreferences', 'webSecurity=no,nodeIntegration=no,contextIsolation=no');
      webview.setAttribute('useragent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36 Edg/133.0.0.0');
      webview.setAttribute('allowpopups', '');
      webview.setAttribute('disablewebsecurity', '');
      webview.setAttribute('partition', 'persist:shrew');
      webview.setAttribute('preload', PRELOAD_URL);
      webviewContainer.appendChild(webview);

      const tabEl = document.createElement('div');
      tabEl.className = 'tab';
      tabEl.dataset.tabId = id;
      const titleEl = document.createElement('span');
      titleEl.className = 'tab-title';
      titleEl.textContent = 'New Tab';
      const closeEl = document.createElement('button');
      closeEl.className = 'tab-close';
      closeEl.textContent = '×';
      closeEl.onclick = (e) => { e.stopPropagation(); closeTab(id); };
      tabEl.appendChild(titleEl);
      tabEl.appendChild(closeEl);
      tabEl.onclick = () => activateTab(id);
      tabbar.insertBefore(tabEl, newTabBtn);

      const tab = { id, webview, tabEl, titleEl, isReady: false };
      tabs.push(tab);

      webview.addEventListener('dom-ready', () => {
        tab.isReady = true;
        webview.insertCSS(`
          * {
            box-sizing: border-box;
          }
          body {
            margin: 0;
            padding: 0;
          }
        `);
      });

      webview.addEventListener('did-fail-load', (e) => {
        console.error('Failed to load:', e.validatedURL, e.errorDescription);
      });

      webview.addEventListener('certificate-error', (e) => {
        e.preventDefault();
      });

      webview.addEventListener('did-navigate', (e) => {
        if (tab.id === activeTabId) {
          if (e.url.includes('homepage.html')) urlbar.value = '';
          else urlbar.value = e.url;
        }
      });

      webview.addEventListener('did-navigate-in-page', (e) => {
        if (tab.id === activeTabId) {
          if (e.url.includes('homepage.html')) urlbar.value = '';
          else urlbar.value = e.url;
        }
      });

      webview.addEventListener('page-title-updated', (e) => {
        titleEl.textContent = e.title || 'New Tab';
        tabEl.title = e.title || '';
      });

      activateTab(id);
      return tab;
    }

    function activateTab(id) {
      activeTabId = id;
      tabs.forEach(t => {
        const isActive = t.id === id;
        t.tabEl.classList.toggle('active', isActive);
        t.webview.classList.toggle('active', isActive);
      });
      const active = getActiveWebview();
      if (active) {
        const url = active.getURL ? active.getURL() : '';
        if (url && !url.includes('homepage.html')) urlbar.value = url;
        else urlbar.value = '';
      }
    }

    function closeTab(id) {
      const idx = tabs.findIndex(t => t.id === id);
      if (idx === -1) return;
      const tab = tabs[idx];
      tab.webview.remove();
      tab.tabEl.remove();
      tabs.splice(idx, 1);
      if (tabs.length === 0) {
        newTab();
      } else if (activeTabId === id) {
        const next = tabs[Math.max(0, idx - 1)];
        activateTab(next.id);
      }
    }

    function newTab() {
      createTab('homepage.html');
    }

    function navigate() {
      let input = urlbar.value.trim();
      const webview = getActiveWebview();
      if (!webview) return;

      if (!input) {
        webview.loadURL('homepage.html');
        return;
      }

      const isURL = input.includes('.') && !input.includes(' ') &&
                    (input.startsWith('http://') || input.startsWith('https://') ||
                     /\w+\.\w{2,}/.test(input));

      if (isURL) {
        let url = input;
        if (!url.startsWith('http://') && !url.startsWith('https://')) {
          url = 'https://' + url;
        }
        webview.loadURL(url);
      } else {
        webview.loadURL(`search.html?q=${encodeURIComponent(input)}`);
      }
    }

    function goBack() {
      const webview = getActiveWebview();
      if (webview && webview.canGoBack()) webview.goBack();
    }

    function goForward() {
      const webview = getActiveWebview();
      if (webview && webview.canGoForward()) webview.goForward();
    }

    function reload() {
      const webview = getActiveWebview();
      if (webview) webview.reload();
    }

    // Fallback for google's stubborn signin — pop the current URL open
    // in the system's default browser. Click ⇱ while on accounts.google.com
    // if shrew still gets blocked.
    function openExternal() {
      const webview = getActiveWebview();
      if (!webview) return;
      const url = webview.getURL();
      if (!url) return;
      require('electron').shell.openExternal(url);
    }

    urlbar.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        navigate();
      }
    });

    // boot up with one tab
    newTab();
</script>
</body>
</html>
